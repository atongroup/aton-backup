name: Sesjon Push

on:
  repository_dispatch:
    types: [sesjon-exit]

jobs:
  push-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skriv loggfil
        run: |
          echo "${{ github.event.client_payload.content }}" | base64 -d > "${{ github.event.client_payload.filename }}"

      - name: Commit og push
        run: |
          git config user.name "Aton Bot"
          git config user.email "leif@atongroup.no"
          git add -A
          git commit -m "Sesjonslogg ${{ github.event.client_payload.date }}"
          git push
