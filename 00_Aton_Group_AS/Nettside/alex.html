<body>

      <div class="cl-foot">

document.getElementById('userName').textContent=name;

let h='',m='';
ITEMS.forEach((n,i)=>{

  h+=`<button class="nav-btn${i===0?' active':''}" data-id="${n.i}" onclick="goto('${n.i}')">${ic}${n.l}</button>`;
  m+=`<button class="mob-b${i===0?' on':''}" data-id="${n.i}" onclick="goto('${n.i}')">${ic}${n.l}</button>`;
});
document.getElementById('navItems').innerHTML=h;
document.getElementById('mob').innerHTML=m;

function goto(id){
  showPage(id,ITEMS);
  if(id==='app')loadAppUsers();
}

function eierBar(){
  const R=18,cx=23,cy=23,circ=2*Math.PI*R;
  const segs=[{p:80,c:'var(--gold)'},{p:10,c:'var(--lone)'},{p:10,c:'var(--alex)'}];
  let off=0,s='';
  segs.forEach(d=>{const len=circ*d.p/100;s+=`<circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="${d.c}" stroke-width="8" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-off}" opacity=".9"/>`;off+=len;});
  return`<div class="eier-bar">
  <div class="eier-donut">
    <svg viewBox="0 0 46 46"><circle cx="23" cy="23" r="18" fill="none" stroke="var(--bg3)" stroke-width="8"/>${s}</svg>
    <div class="eier-donut-lbl"><div class="eier-pst" style="color:var(--alex)">10%</div><div class="eier-sub">Din andel</div></div>
  </div>

    <div class="eier-vals"><div class="eier-val">Her &amp; nå: <strong style="color:var(--alex)">NOK 6,8M</strong></div></div>
  </div>
</div>`;
}
