<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --gold:#c8a030;--gold2:#e0b840;
  --dark:#050d18;--dark2:#081520;--dark3:#0a1e30;
  --surface:rgba(255,255,255,.04);--border:rgba(200,160,48,.15);
  --tx1:#f0ead8;--tx2:#907860;--tx3:#506070;
  --green:#3acd7a;--red:#e05050;--r:6px
}
body{background:var(--dark);color:var(--tx1);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
.view{display:none;min-height:100vh}
.view.active{display:flex;flex-direction:column}

/* LOGIN */
#login-view{align-items:center;justify-content:center;padding:2rem;position:relative;overflow:hidden}
#login-view::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(200,160,48,.06) 0%,transparent 65%),radial-gradient(ellipse 30% 30% at 20% 80%,rgba(58,154,238,.03) 0%,transparent 60%);pointer-events:none}
.login-box{position:relative;z-index:1;width:100%;max-width:400px;text-align:center;animation:fadeUp .7s ease both}
.login-logo{margin-bottom:1.8rem}
.login-logo svg{width:54px;height:54px}
.login-title{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:300;margin-bottom:.3rem;letter-spacing:.02em}
.login-sub{font-size:.72rem;color:var(--tx3);letter-spacing:.15em;text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:2.5rem}
.google-btn-wrap{display:flex;justify-content:center;margin-bottom:.5rem}
.login-note{font-size:.68rem;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:1.5rem;line-height:1.7}
#login-error{margin-top:1rem;padding:.7rem 1rem;background:rgba(224,80,80,.1);border:1px solid rgba(224,80,80,.3);color:var(--red);font-size:.78rem;border-radius:var(--r);display:none}

/* HUB */
#hub-view{flex-direction:column;height:100vh;overflow:hidden}
.topbar{height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem;border-bottom:1px solid var(--border);background:rgba(5,13,24,.95);backdrop-filter:blur(8px);flex-shrink:0;gap:1rem}
.topbar-logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;flex-shrink:0}
.topbar-logo svg{width:24px;height:24px}
.topbar-logo-text{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-weight:600;color:var(--tx1);letter-spacing:.04em}
.topbar-logo-text span{color:var(--gold)}
.model-select{background:var(--surface);border:1px solid var(--border);color:var(--tx2);font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.05em;padding:.3rem .7rem;outline:none;cursor:pointer;border-radius:var(--r);flex-shrink:0}
.topbar-right{display:flex;align-items:center;gap:.8rem;flex-shrink:0}
.user-badge{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--tx3);font-family:'DM Mono',monospace}
.user-avatar{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold);flex-shrink:0;overflow:hidden;background:var(--dark3)}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.btn-icon{background:none;border:none;color:var(--tx3);cursor:pointer;padding:.3rem;border-radius:4px;transition:color .2s;display:flex;align-items:center}
.btn-icon:hover{color:var(--gold)}
.hub-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);background:rgba(8,21,32,.6);display:flex;flex-direction:column;overflow-y:auto;padding:1rem 0}
.sidebar-section{padding:0 .8rem;margin-bottom:1.5rem}
.sidebar-label{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--tx3);letter-spacing:.15em;text-transform:uppercase;padding:0 .4rem;margin-bottom:.4rem}
.new-chat-btn{width:100%;padding:.55rem .8rem;background:rgba(200,160,48,.1);border:1px solid rgba(200,160,48,.25);color:var(--gold);font-family:'Outfit',sans-serif;font-size:.78rem;cursor:pointer;border-radius:var(--r);transition:all .2s;display:flex;align-items:center;gap:.5rem;margin-bottom:1rem}
.new-chat-btn:hover{background:rgba(200,160,48,.18);border-color:rgba(200,160,48,.5)}
.preset-btn{width:100%;padding:.45rem .8rem;background:none;border:none;color:var(--tx2);font-size:.78rem;cursor:pointer;border-radius:var(--r);transition:all .15s;text-align:left;display:flex;align-items:center;gap:.5rem}
.preset-btn:hover{background:var(--surface);color:var(--tx1)}
.preset-btn.active{background:rgba(200,160,48,.08);color:var(--gold)}
.chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-track{background:transparent}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:3rem 2rem;gap:1rem;opacity:.7}
.welcome-icon{font-size:2.5rem;margin-bottom:.5rem}
.welcome h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:var(--tx1)}
.welcome p{font-size:.82rem;color:var(--tx3);max-width:320px;line-height:1.7}
.msg{display:flex;gap:.8rem;animation:fadeUp .3s ease both;max-width:820px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:500;margin-top:.15rem}
.msg.assistant .msg-avatar{background:rgba(200,160,48,.15);border:1px solid rgba(200,160,48,.25);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:.9rem}
.msg.user .msg-avatar{background:rgba(255,255,255,.06);border:1px solid var(--border);overflow:hidden}
.msg.user .msg-avatar img{width:100%;height:100%;object-fit:cover}
.msg-bubble{padding:.75rem 1rem;border-radius:var(--r);font-size:.88rem;line-height:1.75;max-width:calc(100% - 42px)}
.msg.assistant .msg-bubble{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--tx1)}
.msg.user .msg-bubble{background:rgba(200,160,48,.12);border:1px solid rgba(200,160,48,.2);color:var(--tx1)}
.msg-bubble p{margin-bottom:.6rem}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble code{font-family:'DM Mono',monospace;font-size:.8em;background:rgba(255,255,255,.07);padding:.1em .4em;border-radius:3px}
.msg-bubble pre{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:var(--r);padding:.8rem 1rem;overflow-x:auto;margin:.5rem 0}
.msg-bubble pre code{background:none;padding:0;font-size:.8rem;line-height:1.6}
.msg-bubble strong{color:var(--tx1);font-weight:500}
.msg-bubble ul,.msg-bubble ol{padding-left:1.4rem;margin:.4rem 0}
.msg-bubble li{margin:.25rem 0}
.typing-indicator{display:flex;gap:4px;align-items:center;padding:.6rem .8rem}
.typing-indicator span{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.4;animation:typingBounce 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
.input-area{padding:1rem 1.5rem 1.2rem;border-top:1px solid var(--border);background:rgba(5,13,24,.8);backdrop-filter:blur(8px);flex-shrink:0}
.input-wrap{display:flex;gap:.6rem;align-items:flex-end;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r);padding:.5rem .5rem .5rem .8rem;transition:border-color .2s}
.input-wrap:focus-within{border-color:rgba(200,160,48,.4)}
#msg-input{flex:1;background:none;border:none;outline:none;color:var(--tx1);font-family:'Outfit',sans-serif;font-size:.88rem;line-height:1.5;resize:none;min-height:22px;max-height:140px;padding:.15rem 0}
#msg-input::placeholder{color:var(--tx3)}
.send-btn{width:34px;height:34px;background:var(--gold);border:none;border-radius:4px;color:var(--dark);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.send-btn:hover{background:var(--gold2);transform:scale(1.05)}
.send-btn:disabled{background:var(--border);color:var(--tx3);transform:none;cursor:default}
.input-hint{font-size:.65rem;color:var(--tx3);font-family:'DM Mono',monospace;margin-top:.5rem;text-align:center}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){.sidebar{display:none}.messages{padding:1rem}.input-area{padding:.8rem 1rem 1rem}}
</style>
</head>

        </button>
        <div class="sidebar-label">Forhåndsinnstillinger</div>
        <button class="preset-btn active" onclick="setPreset(this,'general')">💬 Generell assistent</button>
        <button class="preset-btn" onclick="setPreset(this,'bladeship')">⚓ BladeShip</button>
        <button class="preset-btn" onclick="setPreset(this,'investor')">📊 Investor pitch</button>
        <button class="preset-btn" onclick="setPreset(this,'email')">✉️ E-postutkast</button>
        <button class="preset-btn" onclick="setPreset(this,'legal')">⚖️ Juridisk</button>
        <button class="preset-btn" onclick="setPreset(this,'strategy')">🎯 Strategi</button>
      </div>
    </div>
    <div class="chat-area">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome-msg">
          <div class="welcome-icon">✦</div>
          <h2>God dag, <span id="welcome-name"></span></h2>
          <p>Hva kan jeg hjelpe deg med i dag?</p>
        </div>
      </div>
      <div class="input-area">
        <div class="input-wrap">
          <textarea id="msg-input" placeholder="Skriv en melding..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="19" x2="12" y2="5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        </div>
        <div class="input-hint">Enter for sende · Shift+Enter ny linje</div>
      </div>
    </div>
  </div>
</div>

<script>
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyot6j9kWSTvzhkGlr_8HnQ2HhcAQptw2a8Adza_X4ZacmvvqDq0edKD0-AprWqFuR4/exec';
const SECRET    = 'AtonGroup2026!GmailSender#Leif';

// Initialiser Google Sign-In når GSI-biblioteket er ferdig lastet
function initGoogleSignIn() {
  google.accounts.id.initialize({
    client_id: '155233765122-fcji10bhiqdo66gv2kiq41cr8qe3kvc3.apps.googleusercontent.com',
    callback: handleGoogleLogin,
    auto_select: false,
    cancel_on_tap_outside: true
  });
  google.accounts.id.renderButton(
    document.getElementById('google-signin-btn'),
    { theme: 'filled_black', size: 'large', text: 'signin_with', shape: 'rectangular', width: 280 }
  );
}
const ALLOWED   = ["leifsunde@gmail.com", "leif@atongroup.no", "lone@atongroup.no", "alexandra@atongroup.no", "leif@bladeship.no"];

const SYSTEMS = {
  general:   'Du er Leifs personlige AI-assistent for Aton Group AS. Svar alltid på norsk med mindre brukeren skriver på et annet språk. Vær presis, profesjonell og praktisk.',
  bladeship: 'Du er ekspert på BladeShip AS – verdens første havgående resirkuleringsanlegg for vindmøller (GRP-blader til glassfibergranulat). Hjelp med pitch, EIC-søknad (€17,5M, ID 101354477), 2 patenter (20260735+20260736), og strategi. Svar på norsk.',
  investor:  'Du er investor relations-rådgiver for Aton Group AS og BladeShip AS. Hjelp med pitch-decks, term sheets og presentasjoner. Svar på norsk.',
  email:     'Du er profesjonell forretningsskribent. Skriv klare, vennlige og profesjonelle e-postutkast på norsk tilpasset konteksten Leif gir deg.',
  legal:     'Du er juridisk rådgiver for Aton Group AS. Hjelp med kontrakter, aksjonæravtaler og norsk selskapsrett. Påminn alltid om å konsultere advokat. Svar på norsk.',
  strategy:  'Du er strategisk rådgiver for Aton Group AS. Analyser situasjoner, gi klare anbefalinger og praktiske neste steg. Svar på norsk.'
};

let currentUser = null;
let messages    = [];
let activePreset = 'general';
let isLoading   = false;

function handleGoogleLogin(response) {
  try {
    const payload = JSON.parse(atob(response.credential.split('.')[1]));
    const email   = payload.email ? payload.email.toLowerCase() : '';
    if (!ALLOWED.includes(email)) {
      showLoginError('Ingen tilgang for ' + email);
      return;
    }
    currentUser = { email, name: payload.name || email.split('@')[0], picture: payload.picture || '' };
    enterHub();
  } catch(e) {
    showLoginError('Pålogging feilet — prøv igjen.');
  }
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

function enterHub() {
  document.getElementById('login-view').classList.remove('active');
  document.getElementById('hub-view').classList.add('active');
  const first = currentUser.name.split(' ')[0];
  document.getElementById('welcome-name').textContent = first;
  const av = document.getElementById('user-avatar-top');
  if (currentUser.picture) {
    av.innerHTML = '<img src="' + currentUser.picture + '" alt="">';
  } else {
    av.textContent = first[0].toUpperCase();
  }
  document.getElementById('msg-input').focus();
}

function logout() {
  const userEmail = currentUser ? currentUser.email : null;
  currentUser = null; messages = [];
  document.getElementById('hub-view').classList.remove('active');
  document.getElementById('login-view').classList.add('active');
  document.getElementById('messages').innerHTML = '<div class="welcome" id="welcome-msg"><div class="welcome-icon">✦</div><h2>God dag, <span id="welcome-name"></span></h2><p>Hva kan jeg hjelpe deg med i dag?</p></div>';
  document.getElementById('login-error').style.display = 'none';
  // Revoke Google session så brukervalg vises ved neste innlogging
  if (userEmail && window.google && google.accounts && google.accounts.id) {
    google.accounts.id.revoke(userEmail, () => {});
    google.accounts.id.disableAutoSelect();
  }
}

function setPreset(btn, id) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activePreset = id;
  newChat();
}

function newChat() {
  messages = [];
  const first = currentUser ? currentUser.name.split(' ')[0] : '';
  const label = document.querySelector('.preset-btn.active')?.textContent?.trim() || '';
  document.getElementById('messages').innerHTML =
    '<div class="welcome"><div class="welcome-icon">✦</div><h2>Klar — ' + label + '</h2><p>Skriv en melding for å begynne.</p></div>';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || isLoading) return;

  document.getElementById('messages').querySelector('.welcome')?.remove();

  messages.push({ role: 'user', content: text });
  appendMsg('user', text);
  input.value = ''; input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isLoading = true;

  const tid = 'typing-' + Date.now();
  appendTyping(tid);

  try {
    const model = document.getElementById('model-select').value;
    const res   = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        secret: SECRET, model, max_tokens: 2000,
        system: SYSTEMS[activePreset], messages
      })
    });
    const data = await res.json();
    removeTyping(tid);
    if (data.error) throw new Error(data.error);
    const reply = data.content && data.content[0] ? data.content[0].text : 'Ingen respons.';
    messages.push({ role: 'assistant', content: reply });
    appendMsg('assistant', reply);
  } catch(err) {
    removeTyping(tid);
    appendMsg('assistant', '⚠️ ' + err.message);
  }

  isLoading = false;
  input.focus();
}

function appendMsg(role, text) {
  const el  = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const avHtml = role === 'assistant'
    ? '<div class="msg-avatar">A</div>'
    : '<div class="msg-avatar">' + (currentUser && currentUser.picture ? '<img src="' + currentUser.picture + '" alt="">' : (currentUser ? currentUser.name[0].toUpperCase() : 'L')) + '</div>';
  div.innerHTML = avHtml + '<div class="msg-bubble">' + fmt(text) + '</div>';
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function appendTyping(id) {
  const el = document.getElementById('messages');
  const d  = document.createElement('div');
  d.className = 'msg assistant'; d.id = id;
  d.innerHTML = '<div class="msg-avatar">A</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function removeTyping(id) { document.getElementById(id)?.remove(); }

function fmt(t) {
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t = t.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  t = t.replace(/`([^`]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  t = t.replace(/^###\s(.+)$/gm, '<strong>$1</strong>');
  t = t.replace(/^##\s(.+)$/gm, '<strong>$1</strong>');
  t = t.split('\n\n').map(p => p.trim() ? '<p>' + p.replace(/\n/g,'<br>') + '</p>' : '').join('');
  return t;
}
</script>
</body>
</html>
