<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aton Hub — Innlogging</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script>
function initGSI(){
  if(typeof handleCredential==='undefined'){setTimeout(initGSI,50);return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('gsi-btn'),{theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:280});
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initGSI()"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{
  background:linear-gradient(145deg,#faf8f2 0%,#f0ece0 50%,#faf8f2 100%);
  font-family:'DM Sans',sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;
}
.card{
  background:#fff;border-radius:20px;padding:44px 40px;
  box-shadow:0 8px 48px rgba(0,0,0,.08);border:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  width:380px;max-width:calc(100vw - 32px);
  animation:up .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.logo{
  width:68px;height:68px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#f5f0e0);
  border:1px solid rgba(184,146,42,.25);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(184,146,42,.12);
}
.logo svg{width:34px;height:34px}
.brand{font-family:'DM Serif Display',serif;font-size:2.1rem;color:#1a1610;letter-spacing:.02em}
.brand span{color:#b8922a;font-style:italic}
.tag{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#b0a898}
.members{display:flex;align-items:center;gap:10px;font-size:.8rem;color:#7a7268}
.avs{display:flex}
.av{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;margin-left:-6px}
.av:first-child{margin-left:0}
.div{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.div::before,.div::after{content:'';height:1px;background:#e8e2d8}
.div span{font-size:.7rem;color:#b0a898;white-space:nowrap}
.founder{
  width:100%;padding:11px;border-radius:8px;
  background:#f9f7f2;border:1px solid rgba(184,146,42,.25);
  color:#b8922a;font-size:.82rem;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s;
}
.founder:hover{background:rgba(184,146,42,.1)}
.msg{font-size:.78rem;color:#7a7268;text-align:center;min-height:20px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none">
      <polygon points="24,6 6,38 42,38" stroke="#b8922a" stroke-width="1.8" stroke-linejoin="round" fill="rgba(184,146,42,.07)"/>
      <circle cx="24" cy="29" r="3.5" fill="#b8922a"/>
    </svg>
  </div>
  <div class="brand">Aton<span>Hub</span></div>
  <div class="tag">Gründer- og teamportal</div>
  <div class="members">
    <div class="avs">
      <div class="av" style="background:rgba(184,146,42,.1);color:#b8922a">LS</div>
      <div class="av" style="background:rgba(124,92,191,.1);color:#7c5cbf">Lo</div>
      <div class="av" style="background:rgba(40,116,200,.1);color:#2874c8">Al</div>
    </div>
    Sunde-familien &amp; team
  </div>
  <div id="gsi-btn"></div>
  <div class="msg" id="msg"></div>
  <div class="div"><span>Ny gründer?</span></div>
  <button class="founder" onclick="alert('Kontakt leif@atongroup.no for å registrere deg.')">Registrer deg som gründer →</button>
</div>

<script>
const CLIENT_ID='155233765122-fcji10bhiqdo66gv2kiq41cr8qe3kvc3.apps.googleusercontent.com';

const ROUTES={
  'leifsunde@gmail.com':'leif.html',
  'leif@atongroup.no':'leif.html',
  'leif@bladeship.no':'leif.html',
  'lone@atongroup.no':'lone.html',
  'alexandra@atongroup.no':'alex.html',
};

function handleCredential(r){
  try{
    const p=JSON.parse(atob(r.credential.split('.')[1]));
    const e=p.email.toLowerCase();
    const dest=ROUTES[e];
    if(!dest){
      document.getElementById('msg').textContent='Ikke autorisert: '+e;
      return;
    }
    // Lagre token midlertidig for videre bruk
    sessionStorage.setItem('aton_token',r.credential);
    sessionStorage.setItem('aton_email',e);
    sessionStorage.setItem('aton_name',p.name||'');
    document.getElementById('msg').textContent='Logger inn...';
    window.location.href=dest;
  }catch(ex){
    document.getElementById('msg').textContent='Noe gikk galt. Prøv igjen.';
    console.error(ex);
  }
}
</script>
</body>
</html>
