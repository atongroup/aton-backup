<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aton Hub</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>function initGSI(){if(typeof handleCredential==='undefined'){setTimeout(initGSI,50);return;}google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential,auto_select:false});google.accounts.id.renderButton(document.getElementById('gsi-btn'),{theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:280});}</script>
<script src="https://accounts.google.com/gsi/client" onload="initGSI()"></script>
<style>
:root{
  --bg:#f8f6f0;--bg2:#ffffff;--bg3:#f2efe8;
  --ink:#1a1610;--ink2:#4a4540;--ink3:#8a8278;--ink4:#b8b0a8;
  --gold:#b8922a;--gold-l:#d4aa45;--gold-bg:rgba(184,146,42,.1);--gold-bd:rgba(184,146,42,.2);
  --lone:#7c5cbf;--lone-bg:rgba(124,92,191,.08);--lone-bd:rgba(124,92,191,.2);
  --alex:#2874c8;--alex-bg:rgba(40,116,200,.08);--alex-bd:rgba(40,116,200,.2);
  --green:#1a8a4a;--green-bg:rgba(26,138,74,.08);
  --red:#c8352a;--red-bg:rgba(200,53,42,.08);
  --orange:#c87020;--orange-bg:rgba(200,112,32,.08);
  --serif:'Playfair Display',serif;--sans:'Inter',sans-serif;--mono:'DM Mono',monospace;
  --r:12px;--r-sm:8px;--r-lg:20px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 4px 24px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);
  --nav-w:228px;--hdr:60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--sans)}

/* ══════════════ LOGIN ══════════════ */
#loginScreen{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#faf8f2 0%,#f0ece0 50%,#faf8f2 100%);
  overflow:hidden;
}
.login-bg-circle{
  position:absolute;border-radius:50%;pointer-events:none;
}
.login-bg-circle:nth-child(1){width:600px;height:600px;top:-200px;right:-200px;background:radial-gradient(circle,rgba(184,146,42,.06) 0%,transparent 70%)}
.login-bg-circle:nth-child(2){width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(124,92,191,.04) 0%,transparent 70%)}
.login-wrap{
  position:relative;z-index:1;
  width:440px;padding:0 20px;
  animation:loginIn .7s cubic-bezier(.4,0,.2,1) both;
}
@keyframes loginIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.login-brand{display:flex;flex-direction:column;align-items:center;margin-bottom:40px}
.login-emblem{
  width:80px;height:80px;border-radius:50%;margin-bottom:20px;
  background:linear-gradient(145deg,#fff,#f5f0e0);
  box-shadow:0 4px 24px rgba(184,146,42,.15),0 1px 4px rgba(0,0,0,.08);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(184,146,42,.15);
}
.login-emblem svg{width:38px;height:38px}
.login-name{font-family:var(--serif);font-size:2.6rem;color:var(--ink);font-weight:400;letter-spacing:.02em}
.login-tagline{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);margin-top:6px}
.login-card{
  background:#fff;border-radius:24px;padding:36px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.04);
  display:flex;flex-direction:column;align-items:center;gap:20px;
}
.login-members{
  display:flex;align-items:center;gap:8px;
  font-size:.8rem;color:var(--ink3);
}
.login-avatars{display:flex;margin-right:4px}
.login-av{
  width:28px;height:28px;border-radius:50%;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;
  font-size:.62rem;font-weight:600;margin-left:-8px;
}
.login-av:first-child{margin-left:0}
.login-av.l{background:var(--gold-bg);color:var(--gold);border-color:#fff}
.login-av.lo{background:var(--lone-bg);color:var(--lone);border-color:#fff}
.login-av.al{background:var(--alex-bg);color:var(--alex);border-color:#fff}
.login-divider{
  width:100%;display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;gap:12px;
}
.login-divider::before,.login-divider::after{content:'';height:1px;background:var(--bg3)}
.login-divider span{font-size:.72rem;color:var(--ink4);white-space:nowrap}
.login-founder-btn{
  width:100%;padding:12px;border-radius:var(--r);
  background:var(--bg);border:1px solid var(--gold-bd);
  color:var(--gold);font-size:.82rem;font-weight:500;letter-spacing:.02em;
  transition:all .2s;
}
.login-founder-btn:hover{background:var(--gold-bg);border-color:var(--gold)}
.login-privacy{font-size:.72rem;color:var(--ink4)}

/* ══════════════ APP ══════════════ */
#app{display:none;height:100%;flex-direction:column}
#app.on{display:flex}

/* HEADER */
#hdr{
  height:var(--hdr);min-height:var(--hdr);
  background:#fff;border-bottom:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  position:relative;z-index:100;flex-shrink:0;
}
.hdr-logo{
  font-family:var(--serif);font-size:1.35rem;color:var(--ink);
  font-weight:400;letter-spacing:.03em;flex-shrink:0;
}
.hdr-logo span{color:var(--gold)}
.hdr-sep{width:1px;height:20px;background:var(--bg3);flex-shrink:0}
.hdr-title{flex:1;font-size:.88rem;font-weight:500;color:var(--ink2)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-badge{
  font-size:.7rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;white-space:nowrap;
}
.hdr-claude{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;font-size:.78rem;font-weight:600;letter-spacing:.02em;
  border:none;box-shadow:0 2px 8px rgba(184,146,42,.3);
  transition:all .2s;
}
.hdr-claude:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,146,42,.4)}
.hdr-claude svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.2}
.hdr-av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:600;border:2px solid var(--bg3);
  transition:all .2s;flex-shrink:0;cursor:pointer;
}
.hdr-av:hover{border-color:var(--gold-bd)}

/* BODY */
#body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--nav-w);min-width:var(--nav-w);
  background:#fff;border-right:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;padding:16px 0;
  overflow-y:auto;flex-shrink:0;
}
.nav-grp-lbl{
  font-size:.64rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink4);padding:14px 16px 6px;
}
.nav-btn{
  display:flex;align-items:center;gap:10px;
  padding:9px 16px;background:transparent;border:none;color:var(--ink3);
  font-size:.88rem;font-weight:400;text-align:left;width:100%;
  border-radius:0;transition:all .15s;position:relative;
}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0;transition:all .15s}
.nav-btn:hover{color:var(--ink);background:var(--bg)}
.nav-btn.active{color:var(--gold);font-weight:500;background:var(--gold-bg)}
.nav-btn.active svg{stroke:var(--gold)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-divider{height:1px;background:var(--bg3);margin:8px 16px}
.nav-footer{margin-top:auto;padding:12px 16px}
.nav-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.nav-user-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;flex-shrink:0}
.nav-user-name{font-size:.88rem;font-weight:500;color:var(--ink)}
.nav-user-role{font-size:.78rem;color:var(--ink3)}
.nav-out{
  width:100%;padding:8px;border-radius:var(--r-sm);
  background:var(--bg);border:1px solid rgba(0,0,0,.07);
  color:var(--ink3);font-size:.8rem;font-weight:500;
  transition:all .2s;
}
.nav-out:hover{background:var(--red-bg);color:var(--red);border-color:rgba(200,53,42,.2)}

/* MAIN */
#main{flex:1;overflow-y:auto;background:var(--bg);padding:28px}
.page{display:none;max-width:860px;margin:0 auto;animation:fadeUp .2s ease both}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* SECTION HEADERS */
.sec{display:flex;align-items:center;gap:10px;margin:28px 0 16px}
.sec:first-child{margin-top:0}
.sec-line{flex:1;height:1px;background:rgba(0,0,0,.07)}
.sec-lbl{font-size:.72rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);white-space:nowrap}

/* CARDS */
.card{background:#fff;border-radius:var(--r);padding:20px;margin-bottom:14px;border:1px solid rgba(0,0,0,.06);box-shadow:var(--shadow)}
.card:hover{box-shadow:var(--shadow-lg);border-color:rgba(0,0,0,.09)}

/* WELCOME HERO */
.hero{
  border-radius:var(--r-lg);padding:32px;margin-bottom:20px;
  position:relative;overflow:hidden;
}
.hero-leif{background:linear-gradient(135deg,#1a1610 0%,#2d2418 60%,#1a1610 100%)}
.hero-lone{background:linear-gradient(135deg,#1e1428 0%,#2d1f44 60%,#1a1020 100%)}
.hero-alex{background:linear-gradient(135deg,#0e1f3a 0%,#162d52 60%,#0e1a30 100%)}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 80% 20%,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.hero-label{font-size:.68rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px;opacity:.6}
.hero-leif .hero-label{color:var(--gold)}
.hero-lone .hero-label{color:#a888e8}
.hero-alex .hero-label{color:#6aaaf0}
.hero-name{font-family:var(--serif);font-size:2.8rem;font-weight:400;color:#fff;line-height:1;margin-bottom:6px}
.hero-name em{font-style:italic}
.hero-leif .hero-name em{color:var(--gold-l)}
.hero-lone .hero-name em{color:#c0a0f8}
.hero-alex .hero-name em{color:#8ac0f8}
.hero-role{font-size:.8rem;opacity:.55;color:#fff;margin-bottom:20px;letter-spacing:.04em}
.hero-quote{
  font-size:.9rem;color:rgba(255,255,255,.7);line-height:1.7;
  border-left:2px solid;padding-left:14px;font-style:italic;
}
.hero-leif .hero-quote{border-color:rgba(184,146,42,.5)}
.hero-lone .hero-quote{border-color:rgba(160,128,248,.4)}
.hero-alex .hero-quote{border-color:rgba(100,160,240,.4)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat{background:#fff;border-radius:var(--r);padding:16px;border:1px solid rgba(0,0,0,.06);box-shadow:var(--shadow);text-align:center}
.stat-n{font-family:var(--serif);font-size:1.9rem;font-weight:400;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-n.ink{color:var(--ink)}
.stat-n.gr{color:var(--green)}
.stat-l{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}

/* ALERTS */
.alert{
  display:flex;align-items:center;gap:14px;
  padding:14px 16px;border-radius:var(--r-sm);margin-bottom:10px;
  border:1px solid;font-size:.85rem;
}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-date{font-family:var(--mono);font-size:.75rem;white-space:nowrap;min-width:70px;font-weight:500}
.alert-text{color:var(--ink2);flex:1;font-size:.9rem}
.alert.urg{background:var(--red-bg);border-color:rgba(200,53,42,.15)}
.alert.urg .alert-dot{background:var(--red)}
.alert.urg .alert-date{color:var(--red)}
.alert.warn{background:var(--orange-bg);border-color:rgba(200,112,32,.15)}
.alert.warn .alert-dot{background:var(--orange)}
.alert.warn .alert-date{color:var(--orange)}
.alert.ok{background:var(--green-bg);border-color:rgba(26,138,74,.15)}
.alert.ok .alert-dot{background:var(--green)}
.alert.ok .alert-date{color:var(--green)}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:.67rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:20px;white-space:nowrap;border:1px solid}
.bg{background:var(--green-bg);color:var(--green);border-color:rgba(26,138,74,.2)}
.by{background:var(--orange-bg);color:var(--orange);border-color:rgba(200,112,32,.2)}
.bx{background:var(--bg3);color:var(--ink3);border-color:rgba(0,0,0,.08)}
.bb{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd)}
.br{background:var(--red-bg);color:var(--red);border-color:rgba(200,53,42,.2)}
.bv{background:var(--lone-bg);color:var(--lone);border-color:var(--lone-bd)}
.ba{background:var(--alex-bg);color:var(--alex);border-color:var(--alex-bd)}

/* PIPELINE */
.pipe-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid var(--bg3);gap:12px;
}
.pipe-row:last-child{border-bottom:none}
.pipe-name{font-size:.92rem;font-weight:500;color:var(--ink);margin-bottom:3px}
.pipe-sub{font-size:.8rem;color:var(--ink3)}
.pipe-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pipe-val{font-family:var(--serif);font-size:1.15rem;color:var(--gold);white-space:nowrap}
.pipe-total{
  padding-top:14px;margin-top:4px;border-top:2px solid var(--bg3);
  display:flex;justify-content:space-between;align-items:center;
}
.pipe-total-lbl{font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.pipe-total-val{font-family:var(--serif);font-size:2rem;color:var(--gold)}

/* SLAGPLAN */
.phase{background:#fff;border-radius:var(--r);border:1px solid rgba(0,0,0,.06);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bg3)}
.phase-title{font-size:.88rem;font-weight:600;color:var(--ink)}
.phase-body{padding:4px 18px 12px}
.pi{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:.88rem}
.pi:last-child{border-bottom:none}
.pi::before{content:'○';color:var(--ink4);font-size:.7rem;padding-top:3px;flex-shrink:0}
.pi.done{color:var(--ink2)}
.pi.done::before{content:'✓';color:var(--green);font-weight:700}
.pi.active::before{content:'→';color:var(--orange)}

/* PORT CARDS */
.port{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(0,0,0,.06);padding:22px;margin-bottom:14px;box-shadow:var(--shadow);transition:all .2s}
.port:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.port-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.port-icon{
  width:48px;height:48px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:1.1rem;font-weight:600;
}
.port-icon.bs{background:linear-gradient(135deg,rgba(184,146,42,.15),rgba(184,146,42,.05));color:var(--gold);border:1px solid var(--gold-bd)}
.port-icon.ve{background:linear-gradient(135deg,var(--lone-bg),rgba(124,92,191,.03));color:var(--lone);border:1px solid var(--lone-bd)}
.port-icon.ts{background:linear-gradient(135deg,var(--alex-bg),rgba(40,116,200,.03));color:var(--alex);border:1px solid var(--alex-bd)}
.port-icon.co{background:var(--bg3);color:var(--ink3);border:1px solid rgba(0,0,0,.08)}
.port-head{flex:1}
.port-title{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:3px}
.port-sub{font-size:.78rem;color:var(--ink3)}
.port-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.port-desc{font-size:.88rem;color:var(--ink2);line-height:1.7;margin-bottom:14px}
.val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:14px}
.val-item{background:var(--bg);border-radius:var(--r-sm);padding:10px 12px;border:1px solid rgba(0,0,0,.06)}
.val-n{display:block;font-family:var(--serif);font-size:1.15rem;color:var(--gold);margin-bottom:2px}
.val-n.ink{color:var(--ink)}
.val-n.gr{color:var(--green)}
.val-l{display:block;font-size:.64rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)}
.port-link{font-size:.78rem;font-weight:500;color:var(--gold);display:inline-flex;align-items:center;gap:4px}
.port-link:hover{text-decoration:underline}

/* CAL */
.cal-row{display:flex;align-items:flex-start;gap:16px;padding:13px 0;border-bottom:1px solid var(--bg3)}
.cal-row:last-child{border-bottom:none}
.cal-date{font-family:var(--mono);font-size:.75rem;font-weight:500;min-width:80px;padding-top:1px;color:var(--ink3)}
.cal-text{font-size:.9rem;color:var(--ink2);line-height:1.5;flex:1}
.cal-row.urg .cal-date{color:var(--red)}
.cal-row.urg .cal-text{font-weight:500;color:var(--ink)}
.cal-row.fam .cal-date{color:var(--alex)}

/* WORKSPACE */
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:20px}
.ws-card{
  background:#fff;border-radius:var(--r);border:1px solid rgba(0,0,0,.07);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
  text-decoration:none;transition:all .2s;box-shadow:var(--shadow);
}
.ws-card:hover{box-shadow:var(--shadow-lg);border-color:var(--gold-bd);transform:translateY(-1px)}
.ws-ic{width:36px;height:36px;border-radius:9px;background:var(--bg);border:1px solid rgba(0,0,0,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-ic svg{width:17px;height:17px;stroke:var(--gold);fill:none;stroke-width:1.7}
.ws-label{font-size:.82rem;font-weight:500;color:var(--ink)}
.ws-sub{font-size:.7rem;color:var(--ink4);margin-top:2px}

.note-wrap{background:#fff;border-radius:var(--r);border:1px solid rgba(0,0,0,.07);padding:18px;box-shadow:var(--shadow)}
.note-lbl{font-size:.66rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4);margin-bottom:10px}
.note-ta{
  width:100%;border:none;background:transparent;
  font-family:var(--sans);font-size:.84rem;color:var(--ink2);
  resize:vertical;min-height:130px;outline:none;line-height:1.8;
}

/* TEAM */
.member{background:#fff;border-radius:var(--r-lg);border:1px solid rgba(0,0,0,.06);padding:20px;margin-bottom:12px;box-shadow:var(--shadow)}
.mem-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.mem-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;letter-spacing:.04em}
.mem-av.ls{background:var(--gold-bg);color:var(--gold);border:2px solid var(--gold-bd)}
.mem-av.lo{background:var(--lone-bg);color:var(--lone);border:2px solid var(--lone-bd)}
.mem-av.al{background:var(--alex-bg);color:var(--alex);border:2px solid var(--alex-bd)}

// ══════════ CLAUDE ══════════
function buildClPills(){
  document.getElementById('clPills').innerHTML=MODES.map(m=>`<button class="cl-pill${m.k===clMode?' act':''}" onclick="setMode('${m.k}')">${m.l}</button>`).join('');
}

function setMode(k){
  clMode=k;clHist=[];
  document.getElementById('clMsgs').innerHTML='';
  buildClPills();
  const names={general:'Generell',bladeship:'BladeShip',investor:'Investor',email:'E-post',legal:'Juridisk',strategy:'Strategi'};
  addClMsg('a','Byttet til '+names[k]+'-modus. Hva kan jeg hjelpe med?');
}

function toggleCl(){
  clOpen=!clOpen;
  document.getElementById('clPanel').classList.toggle('open',clOpen);
  document.getElementById('clBtn').style.cssText=clOpen?'background:var(--ink);color:#fff;box-shadow:none':'';
  if(clOpen)setTimeout(()=>document.getElementById('clIn').focus(),350);
}

function addClMsg(role,txt){
  const el=document.getElementById('clMsgs');
  const d=document.createElement('div');
  d.className='cl-msg '+role;
  d.innerHTML=role==='a'?mdToHtml(txt):esc(txt);
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  return d;
}

function mdToHtml(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  t=t.split('\n\n').map(p=>p.trim()?'<p>'+p.replace(/\n/g,'<br>')+'</p>':'').join('');
  return t||'<p></p>';
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function sendCl(){
  const inp=document.getElementById('clIn');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  addClMsg('u',txt);
  document.getElementById('clSendBtn').disabled=true;
  const typing=document.createElement('div');
  typing.className='cl-typing';
  typing.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('clMsgs').appendChild(typing);
  document.getElementById('clMsgs').scrollTop=99999;
  const c=USERS[CU.email];
  const sys=SYS[clMode](c.n);
  clHist.push({role:'user',content:txt});
  try{
    const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({secret:'AtonGroup2026!GmailSender#Leif',system:sys,messages:clHist.slice(-12),model:'claude-sonnet-4-20250514',max_tokens:1500})});
    const data=await res.json();
    typing.remove();
    const reply=data.content?.[0]?.text||data.error||'Ingen respons.';
    clHist.push({role:'assistant',content:reply});
    addClMsg('a',reply);
  }catch(e){typing.remove();addClMsg('a','Beklager, noe gikk galt. Prøv igjen.');}
  document.getElementById('clSendBtn').disabled=false;
  document.getElementById('clIn').focus();
}
