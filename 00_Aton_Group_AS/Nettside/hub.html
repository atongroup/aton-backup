<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aton Hub</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script>
function initGSI(){
  if(typeof handleCredential==='undefined'){setTimeout(initGSI,50);return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('gsi-btn'),{theme:'filled_black',size:'large',text:'signin_with',shape:'rectangular',width:260});
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initGSI()"></script>
<style>
:root{
  --ink:#0a0805;--deep:#0e0a02;--warm:#1a1408;
  --gold:#c8a030;--gold1:#e8c060;--gold2:rgba(200,160,48,.15);--gold3:rgba(200,160,48,.06);
  --lone:#9878e0;--lone2:rgba(152,120,224,.15);--lone3:rgba(152,120,224,.06);
  --alex:#4898e0;--alex2:rgba(72,152,224,.15);--alex3:rgba(72,152,224,.06);
  --cream:#f5e8c0;--c2:rgba(245,232,192,.7);--c3:rgba(245,232,192,.45);--c4:rgba(245,232,192,.25);
  --green:#4db870;--red:#e05050;--orange:#e09030;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;--mono:'DM Mono',monospace;
  --r:10px;--r-sm:6px;--r-lg:16px;
  --nav-w:220px;--hdr-h:56px;
  --sh:0 2px 20px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--deep);color:var(--cream);font-family:var(--sans);font-size:15px}

/* ─── LOGIN ─── */
#loginScreen{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,rgba(200,160,48,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(200,160,48,.04) 0%,transparent 50%),
             var(--deep);
}
.login-wrap{
  width:100%;max-width:420px;padding:0 24px;
  display:flex;flex-direction:column;align-items:center;gap:0;
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-logo{
  width:72px;height:72px;border-radius:50%;
  border:1px solid rgba(200,160,48,.2);
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle,rgba(200,160,48,.08),transparent);
  margin-bottom:20px;
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,160,48,.1)}50%{box-shadow:0 0 0 12px rgba(200,160,48,.0)}}
.login-logo svg{width:36px;height:36px;stroke:var(--gold);stroke-width:1.2;fill:none}
.login-title{font-family:var(--serif);font-size:2.4rem;font-weight:300;color:var(--cream);letter-spacing:.02em;margin-bottom:6px}
.login-sub{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c3);margin-bottom:36px}
.login-card{
  width:100%;background:rgba(255,255,255,.03);
  border:1px solid rgba(200,160,48,.12);border-radius:var(--r-lg);
  padding:32px 28px;display:flex;flex-direction:column;align-items:center;gap:20px;
}
.login-desc{font-size:.88rem;color:var(--c3);text-align:center;line-height:1.7}
#gsi-btn{width:260px}
.login-divider{width:100%;display:flex;align-items:center;gap:12px}
.login-divider span{font-size:.75rem;color:var(--c4);white-space:nowrap}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:rgba(200,160,48,.1)}
.login-founder-btn{
  width:100%;padding:11px;background:transparent;
  border:1px solid rgba(200,160,48,.18);border-radius:var(--r);
  color:var(--gold);font-family:var(--sans);font-size:.85rem;cursor:pointer;
  transition:all .2s;letter-spacing:.05em;
}
.login-founder-btn:hover{background:var(--gold2);border-color:rgba(200,160,48,.35)}
.login-privacy{font-size:.72rem;color:var(--c4);text-align:center}

/* ─── APP SHELL ─── */
#app{display:none;height:100%;flex-direction:column}
#app.visible{display:flex}

/* HEADER */
#hdr{
  height:var(--hdr-h);min-height:var(--hdr-h);
  background:rgba(14,10,2,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,160,48,.08);
  display:flex;align-items:center;padding:0 16px;gap:12px;
  position:relative;z-index:100;flex-shrink:0;
}
.hdr-logo{font-family:var(--serif);font-size:1.25rem;font-weight:300;color:var(--gold);letter-spacing:.08em;flex-shrink:0}
.hdr-title{
  flex:1;text-align:center;font-size:.75rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--c3);
}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-badge{
  font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:20px;font-family:var(--sans);
  border:1px solid;white-space:nowrap;
}
.hdr-avatar{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:600;letter-spacing:.05em;cursor:pointer;
  border:1px solid rgba(200,160,48,.25);
  background:var(--gold2);color:var(--gold);
  transition:all .2s;flex-shrink:0;
}
.hdr-avatar:hover{background:rgba(200,160,48,.25)}
.hdr-claude-btn{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:20px;
  background:var(--gold2);border:1px solid rgba(200,160,48,.3);
  color:var(--gold);font-size:.75rem;font-family:var(--sans);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.hdr-claude-btn:hover{background:rgba(200,160,48,.25);border-color:var(--gold)}
.hdr-claude-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}

/* BODY */
#body{flex:1;display:flex;overflow:hidden}

/* SIDEBAR */
#sidebar{
  width:var(--nav-w);min-width:var(--nav-w);
  background:rgba(10,8,2,.6);border-right:1px solid rgba(200,160,48,.08);
  display:flex;flex-direction:column;overflow-y:auto;padding:16px 0;flex-shrink:0;
}
.nav-section-lbl{
  font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--c4);padding:12px 16px 6px;
}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 16px;background:transparent;border:none;
  color:var(--c3);font-family:var(--sans);font-size:.83rem;
  cursor:pointer;transition:all .2s;text-align:left;position:relative;
  border-left:2px solid transparent;
}
.nav-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.6;flex-shrink:0;opacity:.7}
.nav-btn:hover{color:var(--cream);background:rgba(200,160,48,.05)}
.nav-btn.active{color:var(--gold);background:rgba(200,160,48,.07);border-left-color:var(--gold)}
.nav-btn.active svg{opacity:1}
.nav-sep{height:1px;background:rgba(200,160,48,.07);margin:8px 16px}
.nav-user-info{padding:12px 16px;margin-top:auto}
.nav-user-name{font-size:.82rem;color:var(--cream)}
.nav-user-role{font-size:.72rem;color:var(--c4);margin-top:2px}
.nav-logout{
  margin:8px 12px 0;padding:7px;background:transparent;
  border:1px solid rgba(200,160,48,.1);border-radius:var(--r-sm);
  color:var(--c4);font-size:.75rem;font-family:var(--sans);cursor:pointer;
  transition:all .2s;width:calc(100% - 24px);
}
.nav-logout:hover{color:var(--red);border-color:rgba(224,80,80,.3);background:rgba(224,80,80,.05)}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column}
.page{display:none;max-width:900px;width:100%;margin:0 auto;animation:pin .25s ease both}
.page.active{display:block}
@keyframes pin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ─── SECTIONS ─── */
.sec{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
.sec-line{flex:1;height:1px;background:rgba(200,160,48,.1)}
.sec-lbl{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c4);white-space:nowrap}

/* ─── CARDS ─── */
.card{
  background:rgba(255,255,255,.025);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:18px;margin-bottom:12px;transition:border-color .2s;
}
.card:hover{border-color:rgba(200,160,48,.2)}

/* ─── HJEM / DASHBOARD ─── */
.welcome-hero{
  background:linear-gradient(135deg,rgba(200,160,48,.07),rgba(200,160,48,.02));
  border:1px solid rgba(200,160,48,.12);border-radius:var(--r-lg);
  padding:28px;margin-bottom:20px;
}
.welcome-time{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--c4);margin-bottom:8px}
.welcome-name{font-family:var(--serif);font-size:2.5rem;font-weight:300;color:var(--cream);line-height:1}
.welcome-name em{font-style:italic;color:var(--gold)}
.welcome-role{font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;color:var(--c3);margin-top:6px;margin-bottom:16px}
.welcome-quote{font-family:var(--serif);font-size:1.1rem;font-style:italic;color:var(--c2);line-height:1.6;border-left:2px solid rgba(200,160,48,.25);padding-left:14px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:12px}
.stat-card{
  background:rgba(255,255,255,.025);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:14px 16px;
}
.stat-val{font-family:var(--serif);font-size:1.8rem;font-weight:300;color:var(--gold);line-height:1}
.stat-val.cream{color:var(--cream)}
.stat-val.green{color:var(--green)}
.stat-lbl{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--c4);margin-top:4px}

.urgent-card{
  background:rgba(224,80,80,.06);border:1px solid rgba(224,80,80,.2);
  border-radius:var(--r);padding:14px 18px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;
}
.urgent-date{font-family:var(--mono);font-size:.75rem;color:var(--red);white-space:nowrap;margin-right:12px}
.urgent-text{font-size:.88rem;color:var(--cream)}

/* ─── BADGES ─── */
.badge{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:var(--sans)}
.bg{background:rgba(77,184,112,.1);color:var(--green);border:1px solid rgba(77,184,112,.25)}
.by{background:rgba(224,160,48,.1);color:var(--orange);border:1px solid rgba(224,160,48,.25)}
.bx{background:rgba(200,160,48,.06);color:var(--c3);border:1px solid rgba(200,160,48,.12)}
.bb{background:rgba(200,160,48,.12);color:var(--gold);border:1px solid rgba(200,160,48,.25)}
.br{background:rgba(224,80,80,.1);color:var(--red);border:1px solid rgba(224,80,80,.25)}

/* ─── SLAGPLAN ─── */
.phase{border:1px solid rgba(200,160,48,.1);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.phase-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(200,160,48,.04);
  cursor:pointer;transition:background .2s;
}
.phase-hdr:hover{background:rgba(200,160,48,.08)}
.phase-title{font-size:.88rem;color:var(--cream);font-weight:500}
.phase-items{padding:4px 16px 12px}
.phase-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 0;border-bottom:1px solid rgba(200,160,48,.05);
  font-size:.84rem;color:var(--c3);
}
.phase-item:last-child{border-bottom:none}
.phase-item::before{content:'○';color:rgba(200,160,48,.3);font-size:.7rem;margin-top:3px;flex-shrink:0}
.phase-item.done{color:var(--c2)}
.phase-item.done::before{content:'✓';color:var(--green)}

/* ─── PORTEFØLJE ─── */
.port-card{
  background:rgba(255,255,255,.025);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:20px;margin-bottom:14px;
  transition:border-color .2s;
}
.port-card:hover{border-color:rgba(200,160,48,.22)}
.port-card.concept{border-color:rgba(200,160,48,.07)}
.port-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.port-icon{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--serif);font-size:1.1rem;font-weight:600;
  background:rgba(200,160,48,.1);color:var(--gold);border:1px solid rgba(200,160,48,.2);
}
.port-heading{flex:1}
.port-title{font-size:1rem;font-weight:500;color:var(--cream);margin-bottom:3px}
.port-sub{font-size:.78rem;color:var(--c3)}
.port-badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.port-desc{font-size:.84rem;color:var(--c3);line-height:1.7;margin-bottom:14px}
.val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.val-item{background:rgba(200,160,48,.04);border:1px solid rgba(200,160,48,.08);border-radius:var(--r-sm);padding:8px 10px}
.val-num{display:block;font-family:var(--serif);font-size:1.2rem;color:var(--gold)}
.val-num.cream{color:var(--cream)}
.val-num.green{color:var(--green)}
.val-lbl{display:block;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--c4);margin-top:2px}
.port-link{font-size:.78rem;color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(200,160,48,.3);padding-bottom:1px}
.port-link:hover{border-color:var(--gold)}

/* ─── KALENDER ─── */
.cal-item{
  display:flex;align-items:flex-start;gap:14px;padding:12px 0;
  border-bottom:1px solid rgba(200,160,48,.06);
}
.cal-item:last-child{border-bottom:none}
.cal-date{
  font-family:var(--mono);font-size:.75rem;color:var(--c3);
  white-space:nowrap;min-width:80px;padding-top:2px;
}
.cal-text{font-size:.88rem;color:var(--cream);line-height:1.5}
.cal-item.urgent .cal-date{color:var(--red)}
.cal-item.urgent .cal-text{color:var(--cream)}
.cal-item.personal .cal-date{color:var(--alex)}

/* ─── WORKSPACE ─── */
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:20px}
.ws-link{
  display:flex;align-items:center;gap:12px;
  background:rgba(255,255,255,.025);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:14px 16px;text-decoration:none;
  color:var(--cream);transition:all .2s;cursor:pointer;
}
.ws-link:hover{background:rgba(200,160,48,.06);border-color:rgba(200,160,48,.25);color:var(--cream)}
.ws-icon{
  width:36px;height:36px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:rgba(200,160,48,.08);
}
.ws-icon svg{width:18px;height:18px;stroke:var(--gold);fill:none;stroke-width:1.6}
.ws-label{font-size:.85rem;font-weight:500}
.ws-sub{font-size:.72rem;color:var(--c4);margin-top:2px}
.ws-note{
  background:rgba(200,160,48,.04);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:18px;
}
.ws-note textarea{
  width:100%;background:transparent;border:none;
  color:var(--cream);font-family:var(--sans);font-size:.88rem;
  resize:vertical;min-height:120px;outline:none;line-height:1.7;
}
.ws-note-lbl{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--c4);margin-bottom:10px}

/* ─── TEAM ─── */
.member{
  background:rgba(255,255,255,.025);border:1px solid rgba(200,160,48,.1);
  border-radius:var(--r);padding:18px;margin-bottom:12px;
}
.mem-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.mem-av{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:600;letter-spacing:.05em;flex-shrink:0;
  background:rgba(200,160,48,.1);color:var(--gold);border:1px solid rgba(200,160,48,.2);
}
.mem-av.lone{background:var(--lone3);color:var(--lone);border-color:rgba(152,120,224,.25)}
.mem-av.alex{background:var(--alex3);color:var(--alex);border-color:rgba(72,152,224,.25)}
.mem-av.ext{background:rgba(77,184,112,.08);color:var(--green);border-color:rgba(77,184,112,.2)}
.mem-name{font-size:.95rem;font-weight:500;color:var(--cream)}
.mem-role{font-size:.75rem;color:var(--c4);margin-top:3px;letter-spacing:.04em}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(200,160,48,.05);font-size:.83rem}
.mrow:last-child{border-bottom:none}
.mrow-lbl{color:var(--c4);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase}
.mrow-val{color:var(--c2);text-align:right}
.mrow-val a{color:var(--gold);text-decoration:none}
.mrow-val a:hover{text-decoration:underline}

/* ─── CLAUDE PANEL ─── */
#claudePanel{
  width:0;min-width:0;overflow:hidden;
  border-left:1px solid rgba(200,160,48,.08);
  background:rgba(8,6,1,.8);
  display:flex;flex-direction:column;
  transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s;
  flex-shrink:0;
}
#claudePanel.open{width:380px;min-width:380px}
.cl-hdr{
  height:var(--hdr-h);display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;border-bottom:1px solid rgba(200,160,48,.08);flex-shrink:0;
}
.cl-hdr-title{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--cream)}
.cl-hdr-title svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:1.6}
.cl-close{background:none;border:none;color:var(--c4);cursor:pointer;padding:4px;font-size:1rem;line-height:1}
.cl-close:hover{color:var(--cream)}
.cl-sys{padding:10px 14px;border-bottom:1px solid rgba(200,160,48,.06);flex-shrink:0}
.cl-sys select{
  width:100%;background:rgba(200,160,48,.05);border:1px solid rgba(200,160,48,.15);
  border-radius:var(--r-sm);color:var(--c2);font-family:var(--sans);font-size:.78rem;
  padding:5px 8px;outline:none;cursor:pointer;
}
.cl-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.cl-msg{max-width:92%;padding:9px 12px;border-radius:10px;font-size:.83rem;line-height:1.6}
.cl-msg.user{
  align-self:flex-end;background:rgba(200,160,48,.12);
  border:1px solid rgba(200,160,48,.2);color:var(--cream);
}
.cl-msg.ai{
  align-self:flex-start;background:rgba(255,255,255,.04);
  border:1px solid rgba(200,160,48,.08);color:var(--c2);
}
.cl-msg.ai p{margin-bottom:6px}
.cl-msg.ai p:last-child{margin-bottom:0}
.cl-msg.ai code{background:rgba(200,160,48,.1);padding:1px 4px;border-radius:3px;font-family:var(--mono);font-size:.8em}
.cl-msg.ai pre{background:rgba(0,0,0,.3);border:1px solid rgba(200,160,48,.1);border-radius:6px;padding:10px;overflow-x:auto;font-family:var(--mono);font-size:.78rem;margin:6px 0}
.cl-typing{align-self:flex-start;padding:9px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(200,160,48,.08);border-radius:10px}
.cl-typing span{display:inline-block;width:5px;height:5px;background:var(--c4);border-radius:50%;animation:dot 1.2s ease-in-out infinite}
.cl-typing span:nth-child(2){animation-delay:.2s}
.cl-typing span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.cl-input-area{
  padding:12px;border-top:1px solid rgba(200,160,48,.08);flex-shrink:0;
  display:flex;gap:8px;align-items:flex-end;
}
.cl-textarea{

function toggleClaude(){

  document.getElementById('claudePanel').classList.toggle('open',clOpen);
  document.getElementById('claudeBtn').style.background = clOpen?'rgba(200,160,48,.25)':'var(--gold2)';

function changeMode(){
  clHistory=[];
  document.getElementById('clMsgs').innerHTML='';
  const modes = {general:'Generell',bladeship:'BladeShip',investor:'Investor',email:'E-post',legal:'Juridisk',strategy:'Strategi'};
  const m = document.getElementById('clMode').value;
  addMsg('ai',`Byttet til ${modes[m]}-modus. Hva kan jeg hjelpe med?`);
}

function addMsg(role,text){
  const msgs = document.getElementById('clMsgs');
  const div = document.createElement('div');
  div.className = 'cl-msg '+role;
  div.innerHTML = role==='ai'?fmtMd(text):escHtml(text);
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function fmtMd(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  t=t.split('\n\n').map(p=>p.trim()?'<p>'+p.replace(/\n/g,'<br>')+'</p>':'').join('');
  return t;
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

async function sendClaude(){
  const inp = document.getElementById('clInput');
  const txt = inp.value.trim();
  if(!txt) return;
  inp.value=''; inp.style.height='auto';
  addMsg('user',txt);
  document.getElementById('clSend').disabled=true;

  const typing = document.createElement('div');
  typing.className='cl-typing';
  typing.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('clMsgs').appendChild(typing);
  document.getElementById('clMsgs').scrollTop=99999;

  const cfg = ALLOWED[currentUser.email];
  const mode = document.getElementById('clMode').value;
  const sys = SYSTEMS[mode](cfg.name+' ('+currentUser.email+')');

  clHistory.push({role:'user',content:txt});
  const msgs = clHistory.slice(-12);

  try{
    const res = await fetch(PROXY_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        secret:'AtonGroup2026!GmailSender#Leif',
        system:sys,
        messages:msgs,
        model:'claude-sonnet-4-20250514',
        max_tokens:1500
      })
    });
    const data = await res.json();
    typing.remove();
    const reply = data.content?.[0]?.text || data.error || 'Ingen respons';
    clHistory.push({role:'assistant',content:reply});
    addMsg('ai',reply);
  }catch(e){
    typing.remove();
    addMsg('ai','Beklager, klarte ikke å nå Claude. Sjekk tilkoblingen.');
  }
  document.getElementById('clSend').disabled=false;
  document.getElementById('clInput').focus();
}
