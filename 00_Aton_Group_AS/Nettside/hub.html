<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aton Hub</title>
<meta name="robots" content="noindex,nofollow">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">
<link rel="apple-touch-icon" href="/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<script>
function initGSI(){
  if(typeof handleCredential==='undefined'){setTimeout(initGSI,50);return;}
  google.accounts.id.initialize({client_id:CLIENT_ID,callback:handleCredential,auto_select:false});
  google.accounts.id.renderButton(document.getElementById('gsi-btn'),{theme:'outline',size:'large',text:'signin_with',shape:'rectangular',width:280});
}
</script>
<script src="https://accounts.google.com/gsi/client" onload="initGSI()"></script>
<style>
:root{
  --gold:#b8922a;--gold-l:#d4aa45;--gold-bg:rgba(184,146,42,.1);--gold-bd:rgba(184,146,42,.25);
  --lone:#7c5cbf;--lone-bg:rgba(124,92,191,.1);--lone-bd:rgba(124,92,191,.25);
  --alex:#2874c8;--alex-bg:rgba(40,116,200,.1);--alex-bd:rgba(40,116,200,.25);
  --green:#1a8a4a;--green-bg:rgba(26,138,74,.1);
  --red:#c8352a;--red-bg:rgba(200,53,42,.1);
  --orange:#c87020;--orange-bg:rgba(200,112,32,.1);
  --bg:#f9f7f2;--bg2:#ffffff;--bg3:#f0ece3;--bg4:#e8e2d8;
  --ink:#1a1610;--ink2:#3a3530;--ink3:#7a7268;--ink4:#b0a898;
  --serif:'DM Serif Display',serif;
  --sans:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --r:10px;--r-sm:6px;--r-lg:16px;
  --nav-w:220px;--hdr:56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:var(--sans);border:none;background:none}

/* ── LOGIN ── */
#login{
  position:fixed;inset:0;z-index:999;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#faf8f2 0%,#f0ece0 50%,#faf8f2 100%);
}
.login-card{
  background:#fff;border-radius:20px;padding:40px 36px;
  box-shadow:0 8px 48px rgba(0,0,0,.08);
  border:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  animation:slideUp .5s cubic-bezier(.4,0,.2,1) both;
  width:360px;max-width:calc(100vw - 32px);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.login-logo{
  width:64px;height:64px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#f5f0e0);
  border:1px solid var(--gold-bd);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px var(--gold-bg);
}
.login-logo svg{width:32px;height:32px}
.login-name{font-family:var(--serif);font-size:2rem;color:var(--ink);letter-spacing:.02em}
.login-name span{color:var(--gold)}
.login-tag{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink4)}
.login-avs{display:flex;gap:-4px;margin:4px 0}
.login-av{width:26px;height:26px;border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:600;margin-left:-6px}
.login-av:first-child{margin-left:0}
.login-members{display:flex;align-items:center;gap:10px;font-size:.8rem;color:var(--ink3)}
.login-div{width:100%;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px}
.login-div::before,.login-div::after{content:'';height:1px;background:var(--bg4)}
.login-div span{font-size:.7rem;color:var(--ink4);white-space:nowrap}
.login-founder{width:100%;padding:11px;border-radius:var(--r);background:var(--bg);border:1px solid var(--gold-bd);color:var(--gold);font-size:.82rem;font-weight:500;transition:all .2s}
.login-founder:hover{background:var(--gold-bg)}

/* ── APP ── */
#app{display:none;height:100%;flex-direction:column}
#app.on{display:flex}

/* ── HEADER ── */
#hdr{
  height:var(--hdr);min-height:var(--hdr);
  background:#fff;border-bottom:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;z-index:100;
}
.hdr-logo{font-family:var(--serif);font-size:1.25rem;color:var(--ink);flex-shrink:0;letter-spacing:.02em}
.hdr-logo em{color:var(--gold);font-style:italic}
.hdr-sep{width:1px;height:18px;background:var(--bg4);flex-shrink:0}
.hdr-title{flex:1;font-size:.82rem;font-weight:500;color:var(--ink3)}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-badge{font-size:.65rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:20px;white-space:nowrap}
.hdr-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;cursor:pointer;border:2px solid transparent}
.hdr-claude{
  display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:#fff;font-size:.72rem;font-weight:600;letter-spacing:.02em;
  box-shadow:0 2px 8px var(--gold-bg);transition:all .2s;
}
.hdr-claude:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,146,42,.4)}
.hdr-claude svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.2}

/* ── BODY ── */
#body{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--nav-w);min-width:var(--nav-w);
  background:#fff;border-right:1px solid rgba(0,0,0,.06);
  display:flex;flex-direction:column;padding:12px 0;overflow-y:auto;flex-shrink:0;
}
.nav-lbl{font-size:.6rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4);padding:12px 16px 4px}
.nav-btn{
  display:flex;align-items:center;gap:9px;padding:8px 16px;
  background:transparent;color:var(--ink3);font-size:.83rem;font-weight:400;
  text-align:left;width:100%;border-radius:0;transition:all .15s;position:relative;
}
.nav-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;flex-shrink:0}
.nav-btn:hover{color:var(--ink);background:var(--bg)}
.nav-btn.active{color:var(--gold);font-weight:500;background:var(--gold-bg)}
.nav-btn.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;background:var(--gold);border-radius:0 3px 3px 0}
.nav-btn.active svg{stroke:var(--gold)}
.nav-div{height:1px;background:var(--bg3);margin:8px 14px}
.nav-footer{margin-top:auto;padding:10px 14px}
.nav-user{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.nav-user-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0}
.nav-user-name{font-size:.82rem;font-weight:500;color:var(--ink)}
.nav-user-role{font-size:.7rem;color:var(--ink4)}
.nav-out{width:100%;padding:7px;border-radius:var(--r-sm);background:var(--bg);border:1px solid rgba(0,0,0,.07);color:var(--ink3);font-size:.76rem;font-weight:500;transition:all .2s}
.nav-out:hover{background:var(--red-bg);color:var(--red);border-color:rgba(200,53,42,.2)}

/* ── MAIN ── */
#main{flex:1;overflow-y:auto;background:var(--bg);padding:24px}
.page{display:none;max-width:820px;margin:0 auto;animation:fadeIn .18s ease both}
.page.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── CARDS & SECTIONS ── */
.sec{display:flex;align-items:center;gap:10px;margin:24px 0 14px}
.sec:first-child{margin-top:0}
.sec-line{flex:1;height:1px;background:rgba(0,0,0,.07)}
.sec-lbl{font-size:.65rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink4);white-space:nowrap}
.card{background:#fff;border-radius:var(--r-lg);padding:18px;margin-bottom:12px;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 8px rgba(0,0,0,.04)}

/* ── HERO ── */
.hero{border-radius:var(--r-lg);padding:28px;margin-bottom:16px;position:relative;overflow:hidden}
.hero-leif{background:linear-gradient(135deg,#1a1610 0%,#2d2418 60%,#1a1610 100%)}
.hero-lone{background:linear-gradient(135deg,#1a1025 0%,#2a1840 60%,#1a1025 100%)}
.hero-alex{background:linear-gradient(135deg,#0e1f3a 0%,#162d50 60%,#0e1830 100%)}
.hero-lbl{font-size:.62rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;opacity:.55;margin-bottom:8px}
.hero-leif .hero-lbl{color:var(--gold)}
.hero-lone .hero-lbl{color:#b09ae8}
.hero-alex .hero-lbl{color:#70aaee}
.hero-name{font-family:var(--serif);font-size:2.4rem;color:#fff;line-height:1;margin-bottom:4px}
.hero-leif .hero-name em{color:var(--gold-l);font-style:italic}
.hero-lone .hero-name em{color:#c0a0f8;font-style:italic}
.hero-alex .hero-name em{color:#90c0f8;font-style:italic}
.hero-role{font-size:.76rem;opacity:.5;color:#fff;margin-bottom:18px;letter-spacing:.04em}
.hero-quote{font-size:.85rem;color:rgba(255,255,255,.65);line-height:1.7;border-left:2px solid;padding-left:12px;font-style:italic}
.hero-leif .hero-quote{border-color:rgba(184,146,42,.5)}
.hero-lone .hero-quote{border-color:rgba(160,128,248,.4)}
.hero-alex .hero-quote{border-color:rgba(100,160,240,.4)}

/* ── EIER-RAD ── */
.eier-bar{display:flex;align-items:center;gap:14px;padding:12px 16px;background:#fff;border-radius:var(--r);border:1px solid rgba(0,0,0,.07);margin-bottom:14px}
.eier-donut{position:relative;width:48px;height:48px;flex-shrink:0}
.eier-donut svg{width:48px;height:48px;transform:rotate(-90deg)}
.eier-donut-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.eier-pst{font-size:.72rem;font-weight:700;line-height:1}
.eier-sub{font-size:.54rem;color:var(--ink4);margin-top:1px}
.eier-info{flex:1}
.eier-title{font-size:.82rem;font-weight:600;color:var(--ink);margin-bottom:1px}
.eier-meta{font-size:.72rem;color:var(--ink3)}
.eier-vals{display:flex;gap:14px;margin-top:4px}
.eier-val{font-size:.7rem;color:var(--ink4)}
.eier-val strong{color:var(--gold)}
.eier-val.green strong{color:var(--green)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:var(--r);padding:14px;border:1px solid rgba(0,0,0,.06);text-align:center}
.stat-n{font-family:var(--serif);font-size:1.7rem;color:var(--gold);line-height:1;margin-bottom:2px}
.stat-n.gr{color:var(--green)}
.stat-n.nk{color:var(--ink)}
.stat-l{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink4)}

/* ── ALERTS ── */
.alert{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm);margin-bottom:8px;border:1px solid;font-size:.82rem}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.alert-date{font-family:var(--mono);font-size:.7rem;white-space:nowrap;min-width:72px;font-weight:500}
.alert-text{color:var(--ink2);flex:1}
.alert.urg{background:var(--red-bg);border-color:rgba(200,53,42,.15)}
.alert.urg .alert-dot{background:var(--red)}
.alert.urg .alert-date{color:var(--red)}
.alert.warn{background:var(--orange-bg);border-color:rgba(200,112,32,.15)}
.alert.warn .alert-dot{background:var(--orange)}
.alert.warn .alert-date{color:var(--orange)}
.alert.ok{background:var(--green-bg);border-color:rgba(26,138,74,.15)}
.alert.ok .alert-dot{background:var(--green)}
.alert.ok .alert-date{color:var(--green)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:.62rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;white-space:nowrap;border:1px solid}
.bg{background:var(--green-bg);color:var(--green);border-color:rgba(26,138,74,.2)}
.by{background:var(--orange-bg);color:var(--orange);border-color:rgba(200,112,32,.2)}
.bx{background:var(--bg3);color:var(--ink3);border-color:rgba(0,0,0,.08)}
.bb{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-bd)}
.br{background:var(--red-bg);color:var(--red);border-color:rgba(200,53,42,.2)}

/* ── PIPELINE ── */
.pipe-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--bg3);gap:10px}
.pipe-row:last-child{border-bottom:none}
.pipe-name{font-size:.85rem;font-weight:500;color:var(--ink);margin-bottom:2px}
.pipe-sub{font-size:.74rem;color:var(--ink4)}
.pipe-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pipe-val{font-family:var(--serif);font-size:1.05rem;color:var(--gold);white-space:nowrap}
.pipe-total{padding-top:12px;margin-top:4px;border-top:2px solid var(--bg3);display:flex;justify-content:space-between;align-items:center}
.pipe-total-lbl{font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.pipe-total-val{font-family:var(--serif);font-size:1.8rem;color:var(--gold)}

/* ── PORTEFØLJE ── */
.port{background:#fff;border-radius:var(--r-lg);padding:20px;margin-bottom:12px;border:1px solid rgba(0,0,0,.06);transition:all .2s}
.port:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);transform:translateY(-1px)}
.port-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.port-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:1rem;font-weight:600;flex-shrink:0}
.port-icon.bs{background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-bd)}
.port-icon.ve{background:var(--lone-bg);color:var(--lone);border:1px solid var(--lone-bd)}
.port-icon.ts{background:var(--alex-bg);color:var(--alex);border:1px solid var(--alex-bd)}
.port-icon.co{background:var(--bg3);color:var(--ink3);border:1px solid var(--bg4)}
.port-head{flex:1}
.port-title{font-size:.92rem;font-weight:600;color:var(--ink);margin-bottom:2px}
.port-sub{font-size:.74rem;color:var(--ink4)}
.port-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.port-desc{font-size:.8rem;color:var(--ink3);line-height:1.65;margin-bottom:10px}
.val-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:7px}
.val-item{background:var(--bg);border-radius:var(--r-sm);padding:8px 10px;border:1px solid rgba(0,0,0,.05)}
.val-n{display:block;font-family:var(--serif);font-size:1.05rem;color:var(--gold);margin-bottom:1px}
.val-n.nk{color:var(--ink)}
.val-n.gr{color:var(--green)}
.val-l{display:block;font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4)}

/* ── KALENDER ── */
.cal-row{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid var(--bg3);font-size:.82rem}
.cal-row:last-child{border-bottom:none}
.cal-date{font-family:var(--mono);font-size:.7rem;font-weight:500;min-width:78px;color:var(--ink3);padding-top:1px}
.cal-text{color:var(--ink2);flex:1;line-height:1.5}
.cal-row.urg .cal-date{color:var(--red)}
.cal-row.urg .cal-text{font-weight:500;color:var(--ink)}
.cal-row.fam .cal-date{color:var(--alex)}

/* ── WORKSPACE ── */
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:18px}
.ws-card{background:#fff;border-radius:var(--r);border:1px solid rgba(0,0,0,.07);padding:12px 14px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:all .2s}
.ws-card:hover{border-color:var(--gold-bd);box-shadow:0 2px 10px rgba(0,0,0,.06);transform:translateY(-1px)}
.ws-ic{width:32px;height:32px;border-radius:8px;background:var(--bg);border:1px solid rgba(0,0,0,.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ws-ic svg{width:15px;height:15px;stroke:var(--gold);fill:none;stroke-width:1.7}
.ws-label{font-size:.78rem;font-weight:500;color:var(--ink)}
.ws-sub{font-size:.67rem;color:var(--ink4);margin-top:1px}

/* ── TEAM ── */
.member{background:#fff;border-radius:var(--r-lg);padding:18px;margin-bottom:10px;border:1px solid rgba(0,0,0,.06)}
.mem-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.mem-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0}
.mem-av.ls{background:var(--gold-bg);color:var(--gold);border:2px solid var(--gold-bd)}
.mem-av.lo{background:var(--lone-bg);color:var(--lone);border:2px solid var(--lone-bd)}
.mem-av.al{background:var(--alex-bg);color:var(--alex);border:2px solid var(--alex-bd)}
.mem-av.ex{background:var(--green-bg);color:var(--green);border:2px solid rgba(26,138,74,.2)}
.mem-name{font-size:.88rem;font-weight:600;color:var(--ink)}
.mem-role{font-size:.72rem;color:var(--ink4);margin-top:2px}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:.8rem}
.mrow:last-child{border-bottom:none}
.mrow-l{color:var(--ink4);font-size:.66rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.mrow-v{color:var(--ink2)}
.mrow-v a{color:var(--gold);font-weight:500}

/* ── ATON APP ── */
.app-stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:16px}
.app-stat{background:#fff;border-radius:var(--r);padding:12px;border:1px solid rgba(0,0,0,.06);text-align:center}
.app-stat-n{font-family:var(--serif);font-size:1.5rem;color:var(--gold);line-height:1}
.app-stat-l{font-size:.62rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink4);margin-top:2px}
.user-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bg3);font-size:.82rem}
.user-row:last-child{border-bottom:none}
.user-info{display:flex;align-items:center;gap:8px}
.user-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.user-email{color:var(--ink2)}
.user-date{font-family:var(--mono);font-size:.68rem;color:var(--ink4)}
#refreshUsers{font-size:.72rem;color:var(--gold);font-weight:500;text-decoration:underline;background:none;border:none;cursor:pointer;margin-top:8px}

/* ── CLAUDE PANEL ── */
#clPanel{
  width:0;min-width:0;overflow:hidden;
  border-left:1px solid rgba(0,0,0,.07);
  background:#fff;display:flex;flex-direction:column;
  transition:width .3s cubic-bezier(.4,0,.2,1),min-width .3s;flex-shrink:0;
}
#clPanel.open{width:360px;min-width:360px}
.cl-hdr{height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid rgba(0,0,0,.07);flex-shrink:0}
.cl-title{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:600;color:var(--ink)}
.cl-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.cl-close{color:var(--ink3);font-size:1rem;padding:5px;border-radius:5px;transition:all .15s}
.cl-close:hover{background:var(--bg);color:var(--ink)}
.cl-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}

.cl-typing span:nth-child(2){animation-delay:.2s}
.cl-typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-3px);opacity:1}}
.cl-modes{padding:10px 14px;border-bottom:1px solid rgba(0,0,0,.06);display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0}

.cl-send:disabled{background:var(--bg4);cursor:not-allowed;transform:none}
.cl-send svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2}

async function loadAppUsers(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/profiles?select=id,email,created_at&order=created_at.desc&limit=50`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    // Prøv auth.users via admin endpoint
    const r2=await fetch(`${SB_URL}/rest/v1/users?select=id,email,created_at&order=created_at.desc&limit=50`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    let users=[];
    if(r2.ok){users=await r2.json();}
    else if(r.ok){users=await r.json();}
    
    if(!Array.isArray(users)||users.length===0){
      // Fallback: hent fra leif_arkiv-tabellen for å se brukere
      const r3=await fetch(`${SB_URL}/rest/v1/leif_arkiv?select=user_id&limit=100`,{
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
      });
      if(r3.ok){
        const rows=await r3.json();
        const unique=[...new Set(rows.map(x=>x.user_id).filter(Boolean))];
        document.getElementById('appStatUsers').textContent=unique.length;
        document.getElementById('appUserList').innerHTML=unique.length?
          unique.map(uid=>`<div class="user-row"><div class="user-info"><div class="user-dot" style="background:var(--green)"></div><div class="user-email" style="font-family:var(--mono);font-size:.72rem">${uid.substring(0,8)}…</div></div></div>`).join(''):
          '<div style="color:var(--ink4);font-size:.8rem;text-align:center;padding:12px">Ingen brukerdata tilgjengelig</div>';
        return;
      }
      document.getElementById('appUserList').innerHTML='<div style="color:var(--ink4);font-size:.8rem;text-align:center;padding:12px">Ingen tilgang til brukerdata (krever service_role)</div>';
      return;
    }
    
    const now=new Date();
    const week=new Date(now-7*864e5);
    const today=new Date(now-864e5);
    const newUsers=users.filter(u=>new Date(u.created_at)>week).length;
    const activeToday=users.filter(u=>new Date(u.last_sign_in_at||u.created_at)>today).length;
    
    document.getElementById('appStatUsers').textContent=users.length;
    document.getElementById('appStatNew').textContent=newUsers;
    document.getElementById('appStatActive').textContent=activeToday||'—';
    
    document.getElementById('appUserList').innerHTML=users.map(u=>`
      <div class="user-row">
        <div class="user-info">
          <div class="user-dot" style="background:${new Date(u.created_at)>week?'var(--green)':'var(--bg4)'}"></div>
          <div class="user-email">${u.email||u.id.substring(0,12)+'…'}</div>
        </div>
        <div class="user-date">${new Date(u.created_at).toLocaleDateString('nb-NO')}</div>
      </div>`).join('');
  }catch(e){
    document.getElementById('appUserList').innerHTML='<div style="color:var(--ink4);font-size:.8rem;text-align:center;padding:12px">Klarte ikke hente brukerdata</div>';
  }
}

// ── CLAUDE ──
function buildModes(){
  document.getElementById('clModes').innerHTML=MODES.map(m=>
    `<button class="cl-pill${m.k===clMode?' act':''}" onclick="setMode('${m.k}')">${m.l}</button>`
  ).join('');
}

function setMode(k){
  clMode=k;clHist=[];
  document.getElementById('clMsgs').innerHTML='';
  buildModes();
  addMsg('a','Byttet til '+{general:'Generell',bladeship:'BladeShip',investor:'Investor',email:'E-post',strategy:'Strategi'}[k]+'-modus. Hva kan jeg hjelpe med?');
}

function toggleCl(){
  clOpen=!clOpen;
  document.getElementById('clPanel').classList.toggle('open',clOpen);
  document.getElementById('hdr').querySelector('.hdr-claude').style.cssText=clOpen?'background:var(--ink);color:#fff;':'';
  if(clOpen)setTimeout(()=>document.getElementById('clIn').focus(),350);
}

function addMsg(role,txt){
  const el=document.getElementById('clMsgs');
  const d=document.createElement('div');
  d.className='cl-msg '+role;
  d.innerHTML=role==='a'?mdToHtml(txt):esc(txt);
  el.appendChild(d);el.scrollTop=el.scrollHeight;
  return d;
}

function mdToHtml(t){
  t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
  t=t.replace(/`([^`]+)`/g,'<code>$1</code>');
  t=t.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  t=t.split('\n\n').map(p=>p.trim()?'<p>'+p.replace(/\n/g,'<br>')+'</p>':'').join('');
  return t||'<p></p>';
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function sendCl(){
  const inp=document.getElementById('clIn');
  const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  addMsg('u',txt);
  document.getElementById('clSend').disabled=true;
  const t=document.createElement('div');t.className='cl-typing';
  t.innerHTML='<span></span><span></span><span></span>';
  document.getElementById('clMsgs').appendChild(t);
  document.getElementById('clMsgs').scrollTop=99999;
  const c=USERS[CU.email];
  clHist.push({role:'user',content:txt});
  try{
    const res=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({secret:'AtonGroup2026!GmailSender#Leif',system:SYS[clMode](c.n),messages:clHist.slice(-12),model:'claude-sonnet-4-20250514',max_tokens:1500})});
    const data=await res.json();
    t.remove();
    const reply=data.content?.[0]?.text||data.error||'Ingen respons.';
    clHist.push({role:'assistant',content:reply});
    addMsg('a',reply);
  }catch(e){t.remove();addMsg('a','Beklager, noe gikk galt. Prøv igjen.');}
  document.getElementById('clSend').disabled=false;
  document.getElementById('clIn').focus();
}
